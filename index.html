<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Princess Games</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #87CEEB, #ffb6e6);
      font-family: 'Comic Sans MS', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    h1 {
      font-size: 38px;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.25);
      margin-bottom: 50px;
      text-align: center;
      padding: 0 20px;
    }
    .game-options {
      display: flex;
      gap: 36px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 20px;
    }
    .game-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: white;
      border: none;
      border-radius: 30px;
      padding: 30px 36px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
      text-decoration: none;
      font-family: inherit;
    }
    .game-btn:active {
      transform: scale(1.07);
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
    }
    .game-btn .icon { font-size: 90px; line-height: 1; }
    .game-btn .name {
      margin-top: 16px;
      font-size: 24px;
      color: #cc44aa;
      font-weight: bold;
      text-align: center;
    }
    .game-btn .tagline {
      margin-top: 6px;
      font-size: 15px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>✨ Choose your game! ✨</h1>
  <div class="game-options">
    <a class="game-btn" href="solar-princess.html">
      <span class="icon">☀️👑</span>
      <span class="name">Solar Princess</span>
      <span class="tagline">Power the castle!</span>
    </a>
    <a class="game-btn" href="moana-sailing.html">
      <span class="icon">🌊⛵</span>
      <span class="name">Moana Sailing</span>
      <span class="tagline">Sail the ocean!</span>
    </a>
  </div>
</body>
</html>
